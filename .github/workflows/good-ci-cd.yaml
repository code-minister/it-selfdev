name: good-ci-cd

on:
  push:
    paths:
      - "ITMO-DevOps-course/basic/lab4/voting-app/services/**"
      - "ITMO-DevOps-course/basic/lab4/voting-app/helm/**"
  pull_request:
    paths:
      - "ITMO-DevOps-course/basic/lab4/voting-app/services/**"

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.sha }}
  VAULT_URL: http://localhost:8200
  VAULT_TOKEN: "myroot"

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ITMO-DevOps-course/basic/lab4/voting-app/services/backend/requirements.txt
            ITMO-DevOps-course/basic/lab4/voting-app/services/frontend/requirements.txt
            ITMO-DevOps-course/basic/lab4/voting-app/services/worker/requirements.txt
      - name: Install dependencies and run tests
        shell: bash
        run: |
          services=(backend frontend worker)
          for svc in "${services[@]}"; do
            echo "==> ${svc}"
            echo "Running tests for ${svc} (placeholder)"
          done

  lint:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Lint (placeholder)
        run: |
          echo "Running lint (placeholder)"

  security_scan:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Security scan (placeholder)
        run: |
          echo "Running security scan (placeholder)"

  build_and_push:
    runs-on: self-hosted
    timeout-minutes: 30
    needs:
      - test
      - lint
      - security_scan
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Docker Credentials from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_URL }}
          token: ${{ env.VAULT_TOKEN }}
          tlsSkipVerify: true
          secrets: |
            secret/data/voting-app DOCKERHUB_USERNAME | DOCKER_USER ;
            secret/data/voting-app DOCKERHUB_TOKEN | DOCKER_TOKEN ;

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ITMO-DevOps-course/basic/lab4/voting-app/services/backend
          push: true
          tags: ${{ env.DOCKER_USER }}/voting-backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ITMO-DevOps-course/basic/lab4/voting-app/services/frontend
          push: true
          tags: ${{ env.DOCKER_USER }}/voting-frontend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ITMO-DevOps-course/basic/lab4/voting-app/services/worker
          push: true
          tags: ${{ env.DOCKER_USER }}/voting-worker:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_test:
    runs-on: self-hosted
    timeout-minutes: 15
    needs: build_and_push
    if: github.event_name == 'push'
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Fetch Username from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_URL }}
          token: ${{ env.VAULT_TOKEN }}
          tlsSkipVerify: true
          secrets: |
            secret/data/voting-app DOCKERHUB_USERNAME | DOCKER_USER ;

      - name: Deploy to test
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        run: |
          helm upgrade --install voting-app ITMO-DevOps-course/basic/lab4/voting-app/helm \
            --namespace test \
            --create-namespace \
            --atomic \
            --wait \
            --timeout 5m \
            --set backend.image.repository="${{ env.DOCKER_USER }}/voting-backend" \
            --set backend.image.tag="${IMAGE_TAG}" \
            --set frontend.image.repository="${{ env.DOCKER_USER }}/voting-frontend" \
            --set frontend.image.tag="${IMAGE_TAG}" \
            --set frontend.nodePort=30001 \
            --set worker.image.repository="${{ env.DOCKER_USER }}/voting-worker" \
            --set worker.image.tag="${IMAGE_TAG}"

  deploy_prod:
    runs-on: self-hosted
    needs: deploy_test
    if: github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Fetch Username from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_URL }}
          token: ${{ env.VAULT_TOKEN }}
          tlsSkipVerify: true
          secrets: |
            secret/data/voting-app DOCKERHUB_USERNAME | DOCKER_USER ;

      - name: Deploy to production
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        run: |
          helm upgrade --install voting-app ITMO-DevOps-course/basic/lab4/voting-app/helm \
            --namespace prod \
            --create-namespace \
            --atomic \
            --wait \
            --timeout 5m \
            --set backend.image.repository="${{ env.DOCKER_USER }}/voting-backend" \
            --set backend.image.tag="${IMAGE_TAG}" \
            --set frontend.image.repository="${{ env.DOCKER_USER }}/voting-frontend" \
            --set frontend.image.tag="${IMAGE_TAG}" \
            --set frontend.nodePort=30002 \
            --set worker.image.repository="${{ env.DOCKER_USER }}/voting-worker" \
            --set worker.image.tag="${IMAGE_TAG}"