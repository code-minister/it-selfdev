apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-pod
        image: c0demin1ster/voting-frontend:v1
        ports:
          - containerPort: 3000
        envFrom:
          - configMapRef:
              name: app-config