apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-frontend
  namespace: dev-environment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-pod
        image: c0demin1ster/voting-frontend:v1
        ports:
          - containerPort: 3000
        envFrom:
          - configMapRef:
              name: app-config

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: dev-environmet
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30000
