user  arthur;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    ssl_certificate     /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    keepalive_timeout 75s;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

    log_format json_combined escape=json
    '{"time":"$time_local", "ip":"$remote_addr", "request":"$request", '
    '"status":"$status", "req_time":"$request_time", "up_time":"$upstream_response_time"}';
    
    access_log /home/arthur/it-selfdev/ITMO-DevOps-course/basic/lab3/part-1/log/access.json json_combined;

    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    map $http_origin $cors_origin {
        default "";
        "~*^https?://portfolio\.local$" $http_origin;
    }

    upstream backend_api {
        server 127.0.0.1:3000;
        server 127.0.0.1:3001;
    }

    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }
    
    server {
        listen 443 ssl;
        http2 on;
        server_name portfolio.local;

        root /home/arthur/it-selfdev/ITMO-DevOps-course/basic/lab3/part-1/frontend; 

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;  
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.portfolio.local; script-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; frame-ancestors 'self';" always;

        location / {
            try_files $uri /index.html;
        }

        location /cv/ {
            alias /home/arthur/it-selfdev/ITMO-DevOps-course/basic/lab3/part-1/documents/;
            
            add_header Content-Disposition 'attachment';
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location ~ /\.(?!well-known).* {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name api.portfolio.local;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;

        location / {
            limit_req zone=mylimit burst=20 nodelay;
            limit_conn addr 15;
        
            if ($request_method = 'OPTIONS') { 
                return 204; 
            }

            proxy_pass http://backend_api;

            proxy_cache api_cache;
            proxy_cache_valid 200 10s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504; 
            proxy_cache_lock on;
        }
    }
}